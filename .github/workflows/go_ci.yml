name: Go
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

defaults:
  run:
    working-directory: backend

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: check-out
        uses: actions/checkout@v4
      - name: setup go
        uses: actions/setup-go@v5
        with:
          go-version: 1.21.5
      - name: build
        run: |
          go build ./...

  test:
    runs-on: ubuntu-latest
    steps:
      - name: check-out
        uses: actions/checkout@v4
      - name: setup go
        uses: actions/setup-go@v5
        with:
          go-version: 1.21.5
      - name: test
        run: |
          go test ./... -v

  fmt:
    runs-on: ubuntu-latest
    steps:
      - name: check-out
        uses: actions/checkout@v4
      - name: setup go
        uses: actions/setup-go@v5
        with:
          go-version: 1.21.5
      - name: fmt
        run: |
          go fmt ./...

  staticcheck:
    runs-on: ubuntu-latest
    steps:
      - name: check-out
        uses: actions/checkout@v4
      - name: setup go
        uses: actions/setup-go@v5
        with:
          go-version: 1.21.5
      - name: staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck
          staticcheck ./...
